<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación IoT Realtime</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f4f8; text-align: center; padding: 20px; }
        h1 { color: #1a73e8; margin-bottom: 30px; }
        
        .container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            width: 240px; 
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-10px); }
        
        .icon { font-size: 3.5em; margin-bottom: 15px; }
        .temp-icon { color: #ea4335; }
        .hum-icon { color: #4285f4; }
        .pres-icon { color: #34a853; }

        .value { font-size: 2.8em; font-weight: bold; color: #333; }
        .label { color: #5f6368; font-weight: 600; text-transform: uppercase; font-size: 0.9em; }
        .unit { font-size: 0.4em; vertical-align: middle; color: #777; }
        
        #status { margin-top: 40px; font-weight: bold; color: #34a853; }
    </style>
</head>
<body>

    <h1><i class="fas fa-microchip"></i> Panel de Control IoT</h1>
    
    <div class="container">
        <div class="card">
            <div class="icon temp-icon"><i class="fas fa-thermometer-half"></i></div>
            <div class="label">Temperatura</div>
            <div class="value"><span id="temp">--</span><span class="unit">°C</span></div>
        </div>

        <div class="card">
            <div class="icon hum-icon"><i class="fas fa-droplet"></i></div>
            <div class="label">Humedad</div>
            <div class="value"><span id="hum">--</span><span class="unit">%</span></div>
        </div>

        <div class="card">
            <div class="icon pres-icon"><i class="fas fa-gauge-simple-high"></i></div>
            <div class="label">Presión</div>
            <div class="value"><span id="pres">--</span></div>
            <div style="font-size: 0.8em; color: #777;">hPa (Hectopascales)</div>
        </div>
    </div>

    <p id="status"><i class="fas fa-link"></i> Conectado a Firebase Realtime</p>

    <script>
        // ESTOS SON TUS DATOS REALES DE TU CAPTURA DE PANTALLA
        const firebaseConfig = {
            apiKey: "AizaSyCrN4oE7ypM0VNkrlp6sO_Hx7PPrx8gZvA",
            authDomain: "estacionmeteorologicaiot.firebaseapp.com",
            databaseURL: "https://estacionmeteorologicaiot-default-rtdb.firebaseio.com",
            projectId: "estacionmeteorologicaiot",
            storageBucket: "estacionmeteorologicaiot.firebasestorage.app",
            messagingSenderId: "458403379108",
            appId: "1:458403379108:web:310f6c0c2bd9d22153f331"
        };

        // Inicializar
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Escuchar cambios en la carpeta "Estacion"
        db.ref('Estacion').on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                // Actualizamos los números en pantalla
                document.getElementById('temp').innerText = data.Temperatura || '--';
                document.getElementById('hum').innerText = data.Humedad || '--';
                document.getElementById('pres').innerText = data.Presion || '--';
                
                console.log("Datos actualizados desde la nube");
            }
        });
    </script>
</body>
</html>
