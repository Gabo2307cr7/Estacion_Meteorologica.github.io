<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estación Meteorológica IoT</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card i { font-size: 2rem; color: #3498db; margin-bottom: 10px; }
        .value { font-size: 1.5rem; font-weight: bold; color: #2c3e50; }
        .label { color: #7f8c8d; font-size: 0.9rem; }
        .chart-container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fa-solid fa-cloud-sun-rain"></i> Mi Estación Meteorológica</h1>
    
    <div class="grid">
        <div class="card">
            <i class="fas fa-thermometer-half" style="color: #e74c3c;"></i>
            <div class="label">Temperatura DHT11</div>
            <div id="temp" class="value">-- °C</div>
        </div>
        <div class="card">
            <i class="fas fa-tint" style="color: #3498db;"></i>
            <div class="label">Humedad</div>
            <div id="hum" class="value">-- %</div>
        </div>
        <div class="card">
            <i class="fas fa-compress-arrows-alt" style="color: #27ae60;"></i>
            <div class="label">Presión</div>
            <div id="pres" class="value">-- hPa</div>
        </div>
        <div class="card">
            <i class="fas fa-cloud-showers-heavy" style="color: #f1c40f;"></i>
            <div class="label">Lluvia Total</div>
            <div id="lluvia" class="value">-- mm</div>
        </div>
        <div class="card">
            <i class="fas fa-mountain" style="color: #8e44ad;"></i>
            <div class="label">Altitud</div>
            <div id="altitud" class="value">-- m</div>
        </div>
        <div class="card">
            <i class="fas fa-thermometer-full" style="color: #e67e22;"></i>
            <div class="label">Temperatura BMP280</div>
            <div id="temp_bmp" class="value">-- °C</div>
        </div>
    </div>

    <div class="chart-container">
        <h3>Historial de Temperatura DHT11 (Últimas 10 lecturas)</h3>
        <canvas id="graficaTemp"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCrN4oE7ypM0VNkrlp6sO_Hx7PPrx8gZvA",  // AIza correcto
        databaseURL: "https://estacionmeteorologicaiot-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // Tiempo real DHT11
    database.ref('/sensores/dht11/tiempo_real').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('temp').innerText = data.temperatura.toFixed(1) + " °C";
            document.getElementById('hum').innerText  = data.humedad.toFixed(1) + " %";
        }
    });

    // Tiempo real BMP280
    database.ref('/sensores/bmp280/tiempo_real').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('pres').innerText     = data.presion.toFixed(0) + " hPa";
            document.getElementById('altitud').innerText  = data.altitud.toFixed(1) + " m";
            document.getElementById('temp_bmp').innerText = data.temperatura.toFixed(1) + " °C";
        }
    });

    // Tiempo real Pluviómetro
    database.ref('/sensores/pluviometro/tiempo_real').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
            document.getElementById('lluvia').innerText = data.lluvia_total.toFixed(2) + " mm";
        }
    });

    // Gráfica con historial DHT11
    const ctx = document.getElementById('graficaTemp').getContext('2d');
    const chart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [],
            datasets: [{
                label: 'Temperatura °C',
                data: [],
                borderColor: '#e74c3c',
                backgroundColor: 'rgba(231, 76, 60, 0.2)',
                fill: true,
                tension: 0.4
            }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });

    database.ref('/sensores/dht11/historial').limitToLast(10).on('value', (snapshot) => {
        const labels = [];
        const values = [];
        snapshot.forEach((child) => {
            const d = child.val();
            const time = new Date(d.timestamp * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            labels.push(time);
            values.push(d.temperatura);
        });
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.update();
    });
</script>

</body>
</html>
